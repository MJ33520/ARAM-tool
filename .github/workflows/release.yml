name: Build and Release

on:
  push:
    branches: ['**']   # 每次 push 任意分支 → v{run_number} 自增正式版，标 latest
    tags: ['v*']       # 推 v* tag → 用 tag 名作为正式版 release
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Determine release context
        id: ctx
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            # 手工 v 语义化 tag（如 v1.0.0）：作为正式版
            $tag = $env:GITHUB_REF_NAME
            $name = "ARAM-Assistant $tag"
            $zipVer = $tag
          } else {
            # 普通 push：用 v{run_number} 自增版本号
            $short = $env:GITHUB_SHA.Substring(0, 7)
            $tag = "v${{ github.run_number }}"
            $name = "ARAM-Assistant $tag ($short)"
            $zipVer = $tag
          }
          # 两条路径都按"正式版 + latest"处理
          $prerelease = 'false'
          $makeLatest = 'true'
          Write-Host "tag=$tag  zipVer=$zipVer  prerelease=$prerelease  latest=$makeLatest"
          "TAG_NAME=$tag"             | Out-File -FilePath $env:GITHUB_ENV -Append
          "RELEASE_NAME=$name"        | Out-File -FilePath $env:GITHUB_ENV -Append
          "ZIP_VERSION=$zipVer"       | Out-File -FilePath $env:GITHUB_ENV -Append
          "IS_PRERELEASE=$prerelease" | Out-File -FilePath $env:GITHUB_ENV -Append
          "MAKE_LATEST=$makeLatest"   | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          pyinstaller `
            --noconsole `
            --onefile `
            --name "ARAM-Assistant" `
            --collect-all google `
            --collect-all google.genai `
            --hidden-import google.genai `
            main.py

      - name: Stage release file
        shell: pwsh
        run: |
          # 直接把 exe 重命名带上版本号——release assets 里点一下就下载，免解压
          $exePath = "ARAM-Assistant-${{ env.ZIP_VERSION }}.exe"
          Move-Item dist/ARAM-Assistant.exe $exePath
          Write-Host "Exe: $exePath"

      - name: Upload artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: ARAM-Assistant-${{ env.ZIP_VERSION }}
          path: ARAM-Assistant-*.exe
          retention-days: 30

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          files: ARAM-Assistant-*.exe
          prerelease: ${{ env.IS_PRERELEASE }}
          make_latest: ${{ env.MAKE_LATEST }}
          generate_release_notes: true
          body: |
            **Tag:** `${{ env.TAG_NAME }}`
            **Commit:** [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            **Branch / Ref:** `${{ github.ref_name }}`
            **Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ---

            下载下方的 `ARAM-Assistant-*.exe`，直接双击即可运行。无需安装 Python，无需解压。

            首次启动：点浮动栏 `⚙️` 按钮配置 LLM 提供商和 API Key。

      - name: Prune old auto-releases (keep newest 10)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 只清理 auto-generated 的 v{N} 数字版本，保留 v1.0.0 / v0.5.0 等
          # 语义化 tag —— 那是用户手动推的里程碑版本，不应该被自动脚本删
          $all = gh release list --limit 1000 --json tagName,createdAt |
                 ConvertFrom-Json | Sort-Object createdAt -Descending

          $autoReleases = $all | Where-Object { $_.tagName -match '^v\d+$' }
          $toDelete = @($autoReleases | Select-Object -Skip 10)

          Write-Host "Auto-release 总数: $($autoReleases.Count) / 阈值 10"
          if ($toDelete.Count -eq 0) {
            Write-Host "无需清理"
            exit 0
          }

          Write-Host "将删除 $($toDelete.Count) 个旧 release（含 tag）:"
          foreach ($r in $toDelete) {
            Write-Host "  -> $($r.tagName)"
            gh release delete $r.tagName --yes --cleanup-tag
          }
