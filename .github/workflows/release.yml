name: Build and Release

on:
  push:
    branches: ['**']   # 每次 push 任意分支 → 滚动 dev release
    tags: ['v*']       # 推 v* tag → 正式版 release
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Determine release context
        id: ctx
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            # 正式版：v-tag
            $tag = $env:GITHUB_REF_NAME
            $name = "ARAM-Assistant $tag"
            $prerelease = 'false'
            $makeLatest = 'true'
            $zipVer = $tag
          } else {
            # 滚动 dev：固定 tag 'dev-latest'，每次覆盖
            $short = $env:GITHUB_SHA.Substring(0, 7)
            $tag = 'dev-latest'
            $name = "Dev Build ($short)"
            $prerelease = 'true'
            $makeLatest = 'false'
            $zipVer = "dev-$short"
          }
          Write-Host "tag=$tag  zipVer=$zipVer  prerelease=$prerelease"
          "TAG_NAME=$tag"         | Out-File -FilePath $env:GITHUB_ENV -Append
          "RELEASE_NAME=$name"    | Out-File -FilePath $env:GITHUB_ENV -Append
          "IS_PRERELEASE=$prerelease" | Out-File -FilePath $env:GITHUB_ENV -Append
          "MAKE_LATEST=$makeLatest" | Out-File -FilePath $env:GITHUB_ENV -Append
          "ZIP_VERSION=$zipVer"   | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          pyinstaller `
            --noconsole `
            --onefile `
            --name "ARAM-Assistant" `
            --collect-all google `
            --collect-all google.genai `
            --hidden-import google.genai `
            main.py

      - name: Stage release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          Copy-Item dist/ARAM-Assistant.exe release/
          Copy-Item README.md release/ -ErrorAction SilentlyContinue
          Copy-Item README_EN.md release/ -ErrorAction SilentlyContinue
          Copy-Item CUSTOM_LLM_SETUP.md release/ -ErrorAction SilentlyContinue
          $zipPath = "ARAM-Assistant-${{ env.ZIP_VERSION }}-windows.zip"
          Compress-Archive -Path release/* -DestinationPath $zipPath -Force
          Write-Host "Zip: $zipPath"

      - name: Upload artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: ARAM-Assistant-${{ env.ZIP_VERSION }}-windows
          path: ARAM-Assistant-*.zip
          retention-days: 30

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          files: ARAM-Assistant-*.zip
          prerelease: ${{ env.IS_PRERELEASE }}
          make_latest: ${{ env.MAKE_LATEST }}
          generate_release_notes: true
          body: |
            **Tag:** `${{ env.TAG_NAME }}`
            **Commit:** `${{ github.sha }}`
            **Built from:** `${{ github.ref_name }}`

            ---

            下载 `ARAM-Assistant-*-windows.zip`，解压后双击 `ARAM-Assistant.exe` 即可运行。无需安装 Python。

            首次启动：点浮动栏 `⚙️` 按钮配置 LLM 提供商和 API Key。
